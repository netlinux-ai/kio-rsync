name: Build .deb package (dual-suite)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bookworm
            container: debian:bookworm
          - target: resolute
            container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Bootstrap container
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git xz-utils zstd

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential cmake \
            extra-cmake-modules \
            libkf5kio-dev libkf5i18n-dev \
            qtbase5-dev


      - name: Build
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)


      - name: Determine version
        id: version
        run: |
          rev=${{ github.run_number }}
          echo "version=1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"
          echo "tag=v1.0-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"


      - name: Package with checkinstall
        run: |
          apt-get install -y checkinstall
          checkinstall --default \
            --pkgname=kio-rsync \
            --pkgversion="${{ steps.version.outputs.version }}" \
            --maintainer="graham@netlinux.co.uk" \
            --requires="libkf5kiocore5" \
            --pakdir=. \
            --install=no \
            --fstrans=no \
            cmake --install build


      - name: Repack .deb for reprepro compatibility
        run: |
          DEB=$(ls kio-rsync_*.deb)
          chmod 666 "$DEB"
          mkdir repack && cd repack
          ar x "../$DEB"
          for f in *.zst; do
            [ -f "$f" ] || continue
            zstd -d "$f"
            xz "${f%.zst}"
            rm "$f"
          done
          rm "../$DEB"
          ar rcs "../$DEB" debian-binary control.tar.xz data.tar.xz


      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: |
            **/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute tag
        id: tag
        run: echo "tag=v${{ github.run_number }}-dualsuite" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ github.run_number }} (bookworm + resolute)
          body: |
            Dual-suite build from commit ${{ github.sha }}.
            Both ~bookworm1 and ~resolute1 .debs are attached.
          files: artifacts/**/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify package repository
        run: |
          sleep 5
          PAYLOAD='{"repo":"netlinux-ai/kio-rsync","tag":"${{ steps.tag.outputs.tag }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary \
            | xxd -p -c 256)
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=${SIGNATURE}" \
            -d "$PAYLOAD" \
            https://packages.netlinux.co.uk/webhook/update-repo
